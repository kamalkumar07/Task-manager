<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Task Manager</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">
        <h2 class="text-center mb-4">📝 Task Manager</h2>

        <!-- Add Task -->
        <form action="/add" method="post" class="d-flex gap-2 mb-3">
            <input type="text" name="task" class="form-control" placeholder="Enter task..." required>
            <button class="btn btn-success">Add</button>
        </form>

        <!-- Task List -->
        <ul class="list-group">

            <li class="list-group-item d-flex justify-content-between align-items-center"
                th:each="task, iterStat : ${tasks}">

                <span th:text="${task}"></span>

                <form action="/delete" method="post">
                    <input type="hidden" name="index" th:value="${iterStat.index}">
                    <button class="btn btn-danger btn-sm">Delete</button>
                </form>

            </li>

        </ul>

    </div>

</div>

</body>
</html>
